name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-excludes: |
            caches/transforms-*
            caches/*/transforms

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Validate release helper
        run: |
          bash -n .mise/tasks/release/prepare
          mise tasks --hidden | grep '^release:prepare'

      - name: Test
        run: mise run test

      - name: Build plugin
        run: mise run build

      - name: Verify plugin
        if: github.event_name == 'push'
        run: mise run verify

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarify-jetbrains-plugin
          path: build/distributions/*.zip
          if-no-files-found: error
