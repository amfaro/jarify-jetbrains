name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Validate release helper
        run: |
          bash -n .mise/tasks/release/prepare
          mise tasks --hidden | grep '^release:prepare'

      - name: Test
        run: mise run test

      - name: Build plugin
        run: mise run build

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarify-jetbrains-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

  # Runs only on main push — verifyPlugin downloads ~7 IDE versions and takes
  # 10+ minutes cold. Keeping it off PRs gives fast feedback without losing
  # full-matrix coverage on merged code.
  verify:
    if: github.event_name == 'push'
    # Gate on build so a test failure short-circuits before the slow verify.
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Verify plugin
        run: mise run verify
