name: Release - Prepare

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'README.md'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'cliff.toml'
      - '.mise/tasks/release/**'
  workflow_dispatch:
    inputs:
      force_version:
        description: >-
          Override version (e.g. 0.1.0). Bypasses git-cliff and
          the already-at-version guard. Use for bootstrap releases.
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Prepare release
        run: mise run release:prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_VERSION: ${{ inputs.force_version }}
