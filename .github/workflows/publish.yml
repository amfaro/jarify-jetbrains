name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'gradle.properties'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip test/build/publish — validate token only'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^pluginVersion=' gradle.properties | cut -d= -f2)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        env:
          VERSION: >-
            ${{ steps.version.outputs.value }}
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipping publish" >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry run complete
        if: inputs.dry_run
        run: |
          echo "dry_run=true: token and checkout validated." >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Dry run complete. Token and checkout work correctly."

      - name: Test
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        run: mise run test

      - name: Build plugin
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        run: mise run build

      - name: Verify plugin
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        run: mise run verify

      - name: Upload plugin artifact
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: jarify-jetbrains-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Publish plugin
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        run: mise run publish
        env:
          JETBRAINS_MARKETPLACE_TOKEN: >-
            ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}

      - name: Tag release
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false' && !inputs.dry_run
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --generate-notes \
            build/distributions/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
